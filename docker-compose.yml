version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pingbase_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: ecto://postgres:postgres@db/pingbase_dev
      SECRET_KEY_BASE: dev-secret-key-base-change-in-production
      PHX_HOST: localhost
    depends_on:
      - db
    volumes:
      - .:/app
    command: /app/bin/server

volumes:
  postgres_data:
